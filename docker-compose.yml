services:
  mongodb:
    image: mongo:latest
    container_name: dsa-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    container_name: dsa-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/dsa_mastery
      - PORT=5000
      - JWT_SECRET=dsa_mastery_secret_key_123
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    container_name: dsa-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
